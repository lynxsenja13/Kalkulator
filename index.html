<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kalkulator Gizi</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

<h1>🥗 Kalkulator Gizi</h1>

<!-- ================= INPUT BAHAN ================= -->
<div class="card">
  <h2>Input Bahan</h2>

  <!-- AUTOCOMPLETE MODERN -->
  <div class="autocomplete">
    <input
      id="namaBahan"
      placeholder="Cari nama bahan..."
      autocomplete="off"
    />
    <div id="dropdownBahan" class="dropdown"></div>
  </div>

  <input id="beratBahan" type="number" placeholder="Berat (gram)" />

  <div class="toolbar">
    <button onclick="tambahBahan()">Tambah</button>
    <button class="generate" onclick="generateLaporan()">
      Generate Laporan
    </button>
    <button class="export" onclick="window.print()">
      Export PDF
    </button>
  </div>

  <ul id="listBahan"></ul>
</div>

<!-- ================= HASIL ================= -->
<div id="hasil"></div>

<!-- ================= NOTE ================= -->
<div class="card">
  <h2>Catatan Hari Ini</h2>
  <textarea id="note" placeholder="Tulis catatan distribusi hari ini..."></textarea>
</div>

</div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
